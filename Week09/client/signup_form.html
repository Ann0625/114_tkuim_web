<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Week09 Signup Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-3">報名表單</h2>
    
    <form id="signup-form" class="vstack gap-3">
      <input class="form-control" name="name" placeholder="姓名" required>
      <input class="form-control" name="email" type="email" placeholder="Email" required>
      <input class="form-control" name="phone" placeholder="手機號碼 (09 開頭)" required>
      
      <button id="submit-btn" class="btn btn-primary" type="submit">送出</button>
    </form>

    <hr class="my-4">

    <button id="get-list-btn" class="btn btn-secondary mb-3">查看目前報名清單 (GET)</button>

    <pre id="result" class="bg-light border p-3">請操作表單或點擊查看按鈕...</pre>
  </div>
  <script src="./signup_form.js" type="module"></script>
</body>
</html>
